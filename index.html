<!doctype html>
<html lang="ru" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Фонды Николая Пюра" />
    <title>Мой фонд (PPF)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%238fa8ff%22/><text x=%2250%22 y=%2267%22 text-anchor=%22middle%22 font-size=%2252%22 font-family=%22Arial%22 font-weight=%22700%22 fill=%22%23090c14%22>Ф</text></svg>" />
    <style>
:root {
  --bg: #0a0c0d;
  --sidebar: #0d1011;
  --surface: #111516;
  --surface-2: #151a1b;
  --surface-3: #1b2021;
  --line: rgba(255, 255, 255, 0.09);
  --line-strong: rgba(255, 255, 255, 0.15);
  --text: #f4f5f1;
  --muted: #8d9694;
  --faint: #606967;
  --accent: #c8ff62;
  --accent-rgb: 200, 255, 98;
  --positive: #77df9b;
  --warning: #ffcb66;
  --danger: #ff756f;
  --blue: #86a7ff;
  --cash: #f0d37b;
  --realestate: #99d866;
  --gold: #ffbd51;
  --market: #7f9ed2;
  --loans: #ef9f72;
  --crypto: #e75e63;
  --radius: 18px;
  --gap: 16px;
  --sidebar-width: 270px;
  --shadow: 0 22px 80px rgba(0, 0, 0, 0.23);
  font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-synthesis: none;
}

html[data-theme="paper"] {
  --bg: #edede8;
  --sidebar: #f5f5f0;
  --surface: #fafaf7;
  --surface-2: #f1f1eb;
  --surface-3: #e9e9e2;
  --line: rgba(15, 20, 19, 0.1);
  --line-strong: rgba(15, 20, 19, 0.17);
  --text: #171a19;
  --muted: #66706d;
  --faint: #8b9390;
  --shadow: 0 22px 60px rgba(55, 62, 58, 0.09);
}

html[data-theme="midnight"] {
  --bg: #090c14;
  --sidebar: #0b0f1a;
  --surface: #101522;
  --surface-2: #151c2b;
  --surface-3: #1a2334;
  --line: rgba(159, 180, 255, 0.11);
  --line-strong: rgba(159, 180, 255, 0.2);
  --text: #f2f5ff;
  --muted: #8e99b0;
  --faint: #5d6880;
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  letter-spacing: -0.01em;
}

button, select, input { font: inherit; }
button { color: inherit; }
button:focus-visible, select:focus-visible, input:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.app-shell { min-height: 100vh; }

.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  width: var(--sidebar-width);
  padding: 24px 16px 18px;
  background: var(--sidebar);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  z-index: 30;
}

.brand, .mobile-brand { display: flex; align-items: center; gap: 11px; }
.brand { padding: 0 8px 26px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--accent); color: #0a0d0c;
  display: grid; place-items: center;
  font-weight: 900; font-size: 16px; letter-spacing: -0.1em;
  box-shadow: 0 0 30px rgba(var(--accent-rgb), 0.16);
}
.brand strong, .mobile-brand strong { font-size: 12px; letter-spacing: 0.08em; }
.brand span { display: block; margin-top: 3px; color: var(--faint); font: 9px/1.1 ui-monospace, monospace; letter-spacing: 0.08em; }

.workspace-tag {
  height: 34px; margin: 0 7px 24px; padding: 0 10px;
  display: flex; align-items: center; gap: 8px;
  background: rgba(var(--accent-rgb), 0.06);
  border: 1px solid rgba(var(--accent-rgb), 0.12);
  border-radius: 9px; color: var(--muted);
  font: 10px ui-monospace, monospace; letter-spacing: 0.07em;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--positive); box-shadow: 0 0 10px var(--positive); }
.lock-icon { margin-left: auto; color: var(--accent); }

.nav-label, .eyebrow, .section-label {
  color: var(--faint); font: 10px ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.12em;
}
.nav-label { margin: 0 10px 10px; }
.fund-nav { display: grid; gap: 5px; }
.nav-item {
  position: relative; width: 100%; min-height: 62px; padding: 9px 9px;
  border: 1px solid transparent; border-radius: 12px; background: transparent;
  display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 7px;
  text-align: left; cursor: pointer; transition: 180ms ease;
}
.nav-item::before {
  content: ""; position: absolute; left: -1px; top: 16px; bottom: 16px; width: 2px;
  border-radius: 2px; background: transparent;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active { background: var(--surface-2); border-color: var(--line); }
.nav-item.active::before { background: var(--accent); box-shadow: 0 0 14px var(--accent); }
.nav-index { color: var(--faint); font: 10px ui-monospace, monospace; }
.nav-item.active .nav-index { color: var(--accent); }
.nav-item b { display: block; font-size: 13px; font-weight: 650; }
.nav-item small { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; }
.nav-item i { color: var(--faint); font: normal 9px ui-monospace, monospace; }
.nav-item.active i { color: var(--muted); }
.sidebar-spacer { flex: 1; min-height: 24px; }

.confidential-card {
  margin: 0 6px 12px; padding: 12px;
  display: grid; grid-template-columns: 28px 1fr; gap: 9px;
  border: 1px solid var(--line); background: var(--surface); border-radius: 12px;
}
.confidential-icon { width: 26px; height: 26px; border-radius: 8px; background: rgba(var(--accent-rgb), 0.1); color: var(--accent); display: grid; place-items: center; }
.confidential-card strong { display: block; font-size: 10px; }
.confidential-card span { display: block; margin-top: 4px; color: var(--faint); font-size: 9px; line-height: 1.4; }
.profile-card {
  padding: 13px 8px 2px; border-top: 1px solid var(--line);
  display: grid; grid-template-columns: 32px 1fr 7px; align-items: center; gap: 9px;
}
.avatar { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: var(--surface-3); font-size: 10px; font-weight: 700; }
.profile-card strong { display: block; font-size: 11px; }
.profile-card span { color: var(--faint); font-size: 9px; }
.profile-state { width: 6px; height: 6px; border-radius: 50%; background: var(--positive); }

.main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
.topbar {
  position: sticky; top: 0; z-index: 20;
  height: 72px; padding: 0 30px;
  display: flex; align-items: center; justify-content: space-between;
  background: color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line);
}
.breadcrumbs { display: flex; align-items: center; gap: 9px; font-size: 11px; }
.breadcrumbs span, .breadcrumbs b { color: var(--faint); font-weight: 400; }
.breadcrumbs strong { font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.freshness { padding-right: 9px; color: var(--muted); font: 9px ui-monospace, monospace; letter-spacing: 0.04em; }
.freshness i { display: inline-block; width: 5px; height: 5px; margin-right: 5px; border-radius: 50%; background: var(--positive); }
.icon-button, .presentation-button {
  height: 36px; border: 1px solid var(--line); border-radius: 9px; background: var(--surface);
  display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: 160ms ease;
}
.icon-button { width: 36px; font-size: 15px; }
.presentation-button { padding: 0 13px; gap: 8px; font-size: 10px; }
.icon-button:hover, .presentation-button:hover { border-color: var(--line-strong); background: var(--surface-2); }
.mobile-brand, .mobile-tabs { display: none; }

#dashboard { width: min(1540px, 100%); margin: 0 auto; padding: 30px; }
.dashboard-view { animation: viewIn 360ms ease both; }
body.no-animations *, body.no-animations *::before, body.no-animations *::after { animation: none !important; transition: none !important; }
@keyframes viewIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }

.view-heading {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 22px;
}
.view-heading h1 { margin: 8px 0 7px; font-size: clamp(27px, 3.1vw, 43px); line-height: 1; letter-spacing: -0.045em; font-weight: 650; }
.view-heading p { margin: 0; color: var(--muted); max-width: 700px; font-size: 12px; line-height: 1.6; }
.muted-title { color: var(--faint); font-weight: 430; }
.view-badge {
  flex: none; padding: 9px 11px; border: 1px solid rgba(var(--accent-rgb), 0.18); border-radius: 99px;
  background: rgba(var(--accent-rgb), 0.05); color: var(--accent); font: 9px ui-monospace, monospace; letter-spacing: .08em;
}

.hero-card {
  position: relative; overflow: hidden; min-height: 270px; padding: 30px;
  border: 1px solid var(--line); border-radius: calc(var(--radius) + 3px);
  background:
    radial-gradient(circle at 86% 28%, rgba(var(--accent-rgb), 0.10), transparent 25%),
    linear-gradient(125deg, var(--surface) 0%, var(--surface-2) 100%);
  box-shadow: var(--shadow);
}
.hero-card::after {
  content: ""; position: absolute; width: 420px; height: 420px; right: -210px; top: -245px;
  border: 1px solid rgba(var(--accent-rgb), 0.10); border-radius: 50%; box-shadow: 0 0 0 42px rgba(var(--accent-rgb), .025), 0 0 0 90px rgba(var(--accent-rgb), .018);
}
.hero-grid { display: grid; grid-template-columns: 1.35fr .8fr; gap: 48px; height: 100%; }
.hero-copy { position: relative; z-index: 1; display: flex; flex-direction: column; }
.hero-kicker { display: flex; align-items: center; gap: 8px; color: var(--accent); font: 9px ui-monospace, monospace; letter-spacing: .1em; text-transform: uppercase; }
.hero-kicker::before { content: ""; width: 18px; height: 1px; background: var(--accent); }
.hero-card h2 { margin: 18px 0 10px; max-width: 790px; font-size: clamp(27px, 3.5vw, 52px); line-height: 1.02; letter-spacing: -0.055em; font-weight: 560; }
.hero-card h2 .hero-accent { color: var(--accent); }
.hero-subtitle { margin: 0; max-width: 690px; color: var(--muted); font-size: 12px; line-height: 1.65; }
.hero-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; padding-top: 27px; }
.chip { padding: 7px 10px; border: 1px solid var(--line); background: rgba(255,255,255,.025); border-radius: 99px; color: var(--muted); font-size: 9px; }
.chip.good { color: var(--positive); border-color: rgba(119,223,155,.17); background: rgba(119,223,155,.05); }
.chip.warning { color: var(--warning); border-color: rgba(255,203,102,.17); background: rgba(255,203,102,.05); }

.hero-target { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; }
.target-label { color: var(--faint); font: 9px ui-monospace, monospace; letter-spacing: .1em; text-transform: uppercase; }
.target-amount { margin: 10px 0 7px; font-size: clamp(38px, 5.4vw, 74px); line-height: .95; letter-spacing: -0.065em; font-weight: 570; white-space: nowrap; }
.target-caption { color: var(--muted); font-size: 10px; }
.progress-wrap { width: 100%; max-width: 390px; margin-top: 27px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--muted); font: 9px ui-monospace, monospace; }
.progress-meta strong { color: var(--text); font-weight: 500; }
.progress-track { height: 6px; border-radius: 99px; background: var(--surface-3); overflow: hidden; }
.progress-track i { display: block; height: 100%; width: var(--progress); background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 60%, transparent), var(--accent)); border-radius: inherit; box-shadow: 0 0 20px rgba(var(--accent-rgb), .3); animation: progressIn 1s cubic-bezier(.2,.8,.2,1) both; }
@keyframes progressIn { from { width: 0; } }

.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); margin-top: var(--gap); }
.metric-card { min-height: 120px; padding: 18px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); }
.metric-top { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 10px; }
.metric-icon { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 7px; background: var(--surface-3); color: var(--accent); font-size: 11px; }
.metric-value { margin: 19px 0 5px; font-size: clamp(21px, 2.3vw, 31px); letter-spacing: -0.045em; font-weight: 560; }
.metric-caption { color: var(--faint); font-size: 9px; line-height: 1.4; }
.metric-caption.good { color: var(--positive); }
.metric-caption.warning { color: var(--warning); }

.content-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--gap); margin-top: var(--gap); }
.panel { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); overflow: hidden; }
.panel.span-4 { grid-column: span 4; }
.panel.span-5 { grid-column: span 5; }
.panel.span-6 { grid-column: span 6; }
.panel.span-7 { grid-column: span 7; }
.panel.span-8 { grid-column: span 8; }
.panel.span-12 { grid-column: span 12; }
.panel-header { min-height: 65px; padding: 17px 19px; display: flex; align-items: flex-start; justify-content: space-between; gap: 15px; border-bottom: 1px solid var(--line); }
.panel-header h3 { margin: 3px 0 0; font-size: 14px; font-weight: 600; }
.panel-header p { margin: 5px 0 0; color: var(--faint); font-size: 9px; }
.panel-header-right { color: var(--muted); font: 9px ui-monospace, monospace; }
.panel-body { padding: 19px; }

.allocation-layout { display: grid; grid-template-columns: 185px 1fr; gap: 22px; align-items: center; }
.donut-wrap { position: relative; width: 172px; height: 172px; display: grid; place-items: center; }
.donut { position: absolute; inset: 0; border-radius: 50%; background: var(--donut); transform: rotate(-90deg); }
.donut::after { content: ""; position: absolute; inset: 22px; border-radius: 50%; background: var(--surface); border: 1px solid var(--line); }
.donut-center { position: relative; z-index: 1; text-align: center; }
.donut-center strong { display: block; font-size: 19px; letter-spacing: -.04em; }
.donut-center span { color: var(--faint); font-size: 8px; text-transform: uppercase; letter-spacing: .09em; }
.legend { display: grid; gap: 10px; }
.legend-row { display: grid; grid-template-columns: 8px 1fr auto; align-items: center; gap: 8px; font-size: 10px; }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; background: var(--color); }
.legend-row span { color: var(--muted); }
.legend-row strong { font: 10px ui-monospace, monospace; font-weight: 500; }

.allocation-bars { display: grid; gap: 15px; }
.allocation-row { display: grid; grid-template-columns: 123px 1fr 58px; gap: 11px; align-items: center; }
.allocation-name { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 10px; }
.allocation-name i { width: 7px; height: 7px; flex: none; border-radius: 2px; background: var(--color); }
.bar-pair { display: grid; gap: 4px; }
.bar-line { height: 6px; background: var(--surface-3); border-radius: 99px; overflow: hidden; }
.bar-line i { display: block; height: 100%; width: var(--width); border-radius: inherit; background: var(--color); opacity: .55; }
.bar-line.target i { opacity: 1; }
.bar-values { text-align: right; font: 8px ui-monospace, monospace; color: var(--faint); }
.bar-values b { display: block; color: var(--text); font-weight: 500; }
.bar-key { display:flex; justify-content:flex-end; gap:14px; color:var(--faint); font:8px ui-monospace,monospace; }
.bar-key span { display:flex; align-items:center; gap:5px; }
.bar-key i { width:12px; height:3px; border-radius:9px; background:var(--muted); opacity:.5; }
.bar-key span:last-child i { opacity:1; background:var(--accent); }
.allocation-numbers { margin-top:2px; padding-top:11px; display:grid; grid-template-columns:1fr 1fr; gap:7px 18px; border-top:1px solid var(--line); }
.allocation-numbers div { display:flex; justify-content:space-between; gap:12px; color:var(--faint); font-size:8px; }
.allocation-numbers b { color:var(--muted); font:8px ui-monospace,monospace; font-weight:500; }

.callout { margin-bottom: 15px; padding: 13px; display: flex; gap: 11px; border: 1px solid rgba(255,203,102,.15); background: rgba(255,203,102,.045); border-radius: 11px; }
.callout.danger { border-color: rgba(255,117,111,.16); background: rgba(255,117,111,.04); }
.callout-icon { flex: none; width: 25px; height: 25px; border-radius: 8px; display: grid; place-items: center; color: var(--warning); background: rgba(255,203,102,.09); font-size: 11px; }
.callout.danger .callout-icon { color: var(--danger); background: rgba(255,117,111,.08); }
.callout strong { display: block; font-size: 10px; }
.callout p { margin: 4px 0 0; color: var(--muted); font-size: 9px; line-height: 1.5; }

.principles { display: grid; gap: 2px; }
.principle { padding: 13px 0; display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); }
.principle:last-child { border-bottom: 0; }
.principle-index { color: var(--accent); font: 9px ui-monospace, monospace; }
.principle strong { display: block; font-size: 10px; }
.principle span { display: block; margin-top: 4px; color: var(--faint); font-size: 9px; }
.principle-tag { padding: 4px 6px; background: var(--surface-3); border-radius: 5px; color: var(--muted); font: 8px ui-monospace, monospace; }

.roadmap { display: grid; grid-template-columns: repeat(4, 1fr); }
.roadmap-step { position: relative; min-height: 156px; padding: 18px; border-right: 1px solid var(--line); }
.roadmap-step:last-child { border-right: 0; }
.roadmap-step::before { content: ""; position: absolute; left: 18px; top: 44px; width: calc(100% - 36px); height: 1px; background: var(--line-strong); }
.roadmap-step.done::before { background: var(--positive); }
.roadmap-step.active::before { background: linear-gradient(90deg, var(--accent) 45%, var(--line-strong) 45%); }
.step-top { display: flex; justify-content: space-between; color: var(--faint); font: 8px ui-monospace, monospace; }
.step-dot { position: relative; z-index: 1; width: 9px; height: 9px; margin-top: 16px; border-radius: 50%; border: 2px solid var(--surface); background: var(--faint); box-shadow: 0 0 0 1px var(--faint); }
.done .step-dot { background: var(--positive); box-shadow: 0 0 0 1px var(--positive); }
.active .step-dot { background: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 12px rgba(var(--accent-rgb), .35); }
.roadmap-step strong { display: block; margin-top: 15px; font-size: 10px; }
.roadmap-step p { margin: 6px 0 0; color: var(--muted); font-size: 9px; line-height: 1.5; }

.table-wrap { width: 100%; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; white-space: nowrap; }
th { padding: 11px 14px; color: var(--faint); font: 8px ui-monospace, monospace; letter-spacing: .08em; text-align: left; text-transform: uppercase; border-bottom: 1px solid var(--line); }
td { padding: 13px 14px; color: var(--muted); font-size: 10px; border-bottom: 1px solid var(--line); }
tr:last-child td { border-bottom: 0; }
td strong { color: var(--text); font-weight: 520; }
.table-note { padding:11px 14px; color:var(--faint); font:8px ui-monospace,monospace; border-top:1px solid var(--line); background:var(--surface-2); }
.table-asset { display: flex; align-items: center; gap: 9px; }
.asset-type-dot { width: 8px; height: 8px; border-radius: 3px; background: var(--color); box-shadow: 0 0 12px color-mix(in srgb, var(--color) 40%, transparent); }
.pill { display: inline-flex; align-items: center; padding: 4px 7px; border-radius: 99px; background: var(--surface-3); color: var(--muted); font-size: 8px; }
.pill.low { color: var(--positive); background: rgba(119,223,155,.08); }
.pill.medium { color: var(--warning); background: rgba(255,203,102,.08); }
.pill.high { color: var(--danger); background: rgba(255,117,111,.08); }

.property-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); }
.property-card { position: relative; overflow: hidden; min-height: 306px; padding: 21px; border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(145deg, var(--surface-2), var(--surface)); }
.property-card::after { content:""; position:absolute; width:150px; height:150px; right:-70px; top:-75px; border:1px solid rgba(var(--accent-rgb),.12); border-radius:50%; }
.property-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.property-type { color: var(--faint); font: 8px ui-monospace, monospace; letter-spacing: .1em; }
.property-card h3 { margin: 8px 0 5px; font-size: 18px; }
.property-address { color: var(--muted); font-size: 10px; }
.property-status { padding: 6px 8px; border-radius: 7px; background: rgba(119,223,155,.08); color: var(--positive); font-size: 8px; white-space: nowrap; }
.property-status.pending { background: rgba(255,203,102,.08); color: var(--warning); }
.property-main { margin: 27px 0 20px; }
.property-main span { color: var(--faint); font: 8px ui-monospace, monospace; text-transform: uppercase; }
.property-main strong { display: block; margin-top: 6px; font-size: 31px; letter-spacing: -.05em; }
.property-stats { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--line); }
.property-stat { padding: 15px 8px 0 0; }
.property-stat span { display: block; color: var(--faint); font-size: 8px; }
.property-stat strong { display: block; margin-top: 6px; font-size: 11px; font-weight: 550; }
.cost-stack { margin-top: 18px; }
.cost-row { display: grid; grid-template-columns: 85px 1fr 50px; align-items: center; gap: 9px; margin-top: 8px; font-size: 8px; color: var(--muted); }
.cost-bar { height: 4px; border-radius: 99px; background: var(--surface-3); overflow: hidden; }
.cost-bar i { display:block; height:100%; width:var(--width); background: var(--accent); opacity:.7; }
.cost-row b { text-align:right; color:var(--text); font-weight:500; }

.pipeline { display: grid; grid-template-columns: repeat(3, 1fr); }
.pipeline-item { min-height: 190px; padding: 19px; border-right: 1px solid var(--line); }
.pipeline-item:last-child { border-right: 0; }
.pipeline-number { color: var(--accent); font: 9px ui-monospace, monospace; }
.pipeline-item h4 { margin: 31px 0 8px; font-size: 14px; }
.pipeline-item p { margin:0; min-height: 42px; color:var(--muted); font-size:9px; line-height:1.55; }
.pipeline-meta { display:flex; justify-content:space-between; margin-top:20px; padding-top:12px; border-top:1px solid var(--line); color:var(--faint); font:8px ui-monospace,monospace; }
.pipeline-meta strong { color:var(--text); font-weight:500; }

.ownership-card { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); }
.ownership-stat { padding: 23px; background: var(--surface); }
.ownership-stat span { color: var(--faint); font: 8px ui-monospace, monospace; letter-spacing:.09em; text-transform:uppercase; }
.ownership-stat strong { display:block; margin-top:10px; font-size:32px; letter-spacing:-.05em; }
.ownership-stat p { margin:7px 0 0; color:var(--muted); font-size:9px; line-height:1.5; }

.safe-mix { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
.mix-card { padding:13px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); }
.mix-color { width:8px; height:8px; border-radius:2px; background:var(--color); }
.mix-card span { display:block; margin:16px 0 5px; color:var(--muted); font-size:8px; }
.mix-card strong { font-size:15px; font-weight:560; }
.mix-card small { display:block; margin-top:5px; color:var(--faint); font:8px ui-monospace,monospace; }

.mandate-panel { background:linear-gradient(125deg, rgba(var(--accent-rgb),.035), var(--surface)); }
.mandate-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.mandate-item { min-height:130px; padding:16px; background:var(--surface); }
.mandate-item > span { color:var(--accent); font:8px ui-monospace,monospace; }
.mandate-item strong { display:block; margin:24px 0 7px; font-size:11px; }
.mandate-item p { margin:0; color:var(--muted); font-size:9px; line-height:1.55; }
.mandate-rule { margin-top:12px; padding:12px 14px; display:flex; justify-content:space-between; gap:15px; border-radius:10px; background:rgba(var(--accent-rgb),.055); border:1px solid rgba(var(--accent-rgb),.11); }
.mandate-rule span { color:var(--faint); font:8px ui-monospace,monospace; text-transform:uppercase; }
.mandate-rule b { color:var(--accent); font-size:10px; font-weight:550; }

.action-toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:13px; }
.action-count { display:flex; align-items:baseline; gap:6px; }
.action-count strong { font-size:18px; font-weight:580; }
.action-count span { color:var(--faint); font-size:8px; }
.action-count i { width:1px; height:15px; margin:0 6px; background:var(--line-strong); }
.download-button { height:34px; padding:0 11px; border:1px solid var(--line); border-radius:8px; background:var(--surface-2); color:var(--muted); font-size:8px; cursor:pointer; }
.download-button:hover { color:var(--text); border-color:var(--line-strong); }
.action-list { display:grid; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.action-item { position:relative; min-height:65px; padding:12px 13px; display:grid; grid-template-columns:18px 34px 1fr auto; align-items:center; gap:10px; border-bottom:1px solid var(--line); background:var(--surface); cursor:pointer; }
.action-item:last-child { border-bottom:0; }
.action-item:hover { background:var(--surface-2); }
.action-item input { position:absolute; opacity:0; pointer-events:none; }
.action-check { width:16px; height:16px; border:1px solid var(--line-strong); border-radius:5px; display:grid; place-items:center; }
.action-item input:checked + .action-check { border-color:var(--positive); background:rgba(119,223,155,.12); }
.action-item input:checked + .action-check::after { content:"✓"; color:var(--positive); font-size:10px; }
.action-id { color:var(--accent); font:8px ui-monospace,monospace; }
.action-copy strong { display:block; font-size:10px; font-weight:560; }
.action-copy small { display:block; margin-top:5px; max-width:940px; color:var(--muted); font-size:8px; line-height:1.5; }
.action-priority { min-width:64px; padding:5px 7px; border-radius:6px; background:var(--surface-3); color:var(--muted); font:7px ui-monospace,monospace; text-align:center; text-transform:uppercase; }
.action-item.completed .action-copy { opacity:.42; }
.action-item.completed .action-copy strong { text-decoration:line-through; }

.data-audit { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:15px; }
.audit-source { padding:15px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); }
.audit-source span { display:block; color:var(--faint); font-size:8px; }
.audit-source strong { display:block; margin-top:7px; font-size:18px; }
.audit-arrow { color:var(--warning); font-size:17px; }
.audit-gap { margin-top:11px; color:var(--warning); font:9px ui-monospace,monospace; text-align:center; }

.dashboard-footer { padding: 0 30px 28px; display:flex; justify-content:space-between; gap:20px; color:var(--faint); font:8px ui-monospace,monospace; letter-spacing:.05em; }

.drawer-backdrop { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.46); backdrop-filter:blur(3px); opacity:0; visibility:hidden; transition:180ms ease; }
.drawer-backdrop.open { opacity:1; visibility:visible; }
.settings-drawer {
  position:fixed; z-index:60; top:0; right:0; bottom:0; width:min(420px, 100%); padding:24px;
  background:var(--sidebar); border-left:1px solid var(--line); box-shadow:-30px 0 90px rgba(0,0,0,.25);
  overflow:auto; transform:translateX(102%); transition:260ms cubic-bezier(.2,.8,.2,1);
}
.settings-drawer.open { transform:none; }
.drawer-header { display:flex; align-items:flex-start; justify-content:space-between; padding-bottom:23px; }
.drawer-header span { color:var(--accent); font:8px ui-monospace,monospace; letter-spacing:.12em; }
.drawer-header h2 { margin:7px 0 0; font-size:28px; letter-spacing:-.04em; }
.settings-section { padding:19px 0; border-top:1px solid var(--line); }
.setting-label { display:block; margin-bottom:11px; color:var(--muted); font-size:10px; font-weight:500; }
.theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.theme-card { padding:7px; border:1px solid var(--line); border-radius:10px; background:var(--surface); cursor:pointer; text-align:left; }
.theme-card.active { border-color:var(--accent); }
.theme-preview { display:block; height:58px; border-radius:6px; border:1px solid rgba(128,128,128,.2); position:relative; overflow:hidden; }
.theme-preview::before { content:""; position:absolute; left:0; top:0; bottom:0; width:25%; background:rgba(255,255,255,.04); border-right:1px solid rgba(128,128,128,.2); }
.theme-preview::after { content:""; position:absolute; left:34%; right:8%; top:13px; height:9px; border-radius:3px; background:var(--accent); box-shadow:0 16px 0 rgba(128,128,128,.18); }
.theme-preview.obsidian { background:#0a0c0d; }
.theme-preview.paper { background:#f4f4ef; }
.theme-preview.midnight { background:#0a0e19; }
.theme-card span { display:block; margin:7px 2px 2px; color:var(--muted); font-size:8px; }
.accent-picker { display:flex; gap:10px; }
.accent { width:27px; height:27px; padding:0; border:3px solid var(--sidebar); outline:1px solid var(--line); border-radius:50%; background:var(--swatch); cursor:pointer; }
.accent.active { outline:2px solid var(--swatch); outline-offset:2px; }
.select-control { width:100%; height:39px; padding:0 10px; color:var(--text); border:1px solid var(--line); border-radius:9px; background:var(--surface); font-size:10px; }
.setting-help, .local-note { margin:9px 0 0; color:var(--faint); font-size:8px; line-height:1.5; }
.two-column-settings { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.toggle-list { display:grid; gap:3px; }
.toggle-row { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:9px 0; cursor:pointer; }
.toggle-row b { display:block; font-size:10px; }
.toggle-row small { display:block; margin-top:4px; color:var(--faint); font-size:8px; }
.toggle-row input { position:absolute; opacity:0; pointer-events:none; }
.toggle-row i { position:relative; width:34px; height:19px; flex:none; border-radius:99px; background:var(--surface-3); border:1px solid var(--line); transition:160ms; }
.toggle-row i::after { content:""; position:absolute; width:13px; height:13px; left:2px; top:2px; border-radius:50%; background:var(--muted); transition:160ms; }
.toggle-row input:checked + i { background:rgba(var(--accent-rgb),.18); border-color:rgba(var(--accent-rgb),.3); }
.toggle-row input:checked + i::after { transform:translateX(15px); background:var(--accent); }
.reset-button { width:100%; height:40px; border:1px solid var(--line); border-radius:9px; background:var(--surface); color:var(--muted); font-size:10px; cursor:pointer; }
.reset-button:hover { color:var(--text); }
.local-note { text-align:center; }

.toast { position:fixed; z-index:90; left:50%; bottom:28px; transform:translate(-50%, 20px); padding:12px 16px; display:flex; gap:8px; align-items:center; border:1px solid rgba(119,223,155,.2); border-radius:10px; background:var(--surface-2); box-shadow:var(--shadow); opacity:0; visibility:hidden; transition:180ms; font-size:10px; }
.toast span { color:var(--positive); }
.toast.show { opacity:1; visibility:visible; transform:translate(-50%,0); }

body[data-density="compact"] { --gap: 10px; --radius: 13px; }
body[data-density="compact"] #dashboard { padding-top:20px; }
body[data-density="compact"] .hero-card { min-height:235px; padding:23px; }
body[data-density="compact"] .metric-card { min-height:100px; padding:14px; }
body[data-density="compact"] .metric-value { margin-top:12px; }
body.hide-risk .risk-panel, body.hide-details .details-panel { display:none; }

body.presentation-mode .sidebar { transform:translateX(-100%); }
body.presentation-mode .main-content { margin-left:0; }
body.presentation-mode .topbar { padding-left:30px; }
body.presentation-mode #dashboard { max-width:1620px; }

@media (max-width: 1180px) {
  .metric-grid { grid-template-columns:repeat(2,1fr); }
  .panel.span-4, .panel.span-5, .panel.span-7, .panel.span-8 { grid-column:span 6; }
  .hero-grid { gap:25px; }
  .allocation-layout { grid-template-columns:150px 1fr; }
  .donut-wrap { width:145px; height:145px; }
}

@media (max-width: 860px) {
  .sidebar { display:none; }
  .main-content { margin-left:0; }
  .mobile-brand { display:flex; }
  .breadcrumbs { display:none; }
  .topbar { height:64px; padding:0 16px; }
  .freshness, .presentation-button .button-label { display:none; }
  .mobile-tabs { position:sticky; top:64px; z-index:19; padding:7px 12px; display:grid; grid-template-columns:repeat(4,1fr); gap:5px; background:color-mix(in srgb,var(--bg) 92%,transparent); backdrop-filter:blur(16px); border-bottom:1px solid var(--line); }
  .mobile-tabs button { height:34px; border:1px solid transparent; border-radius:8px; background:transparent; color:var(--muted); font-size:9px; }
  .mobile-tabs button.active { color:var(--text); background:var(--surface-2); border-color:var(--line); }
  #dashboard { padding:22px 16px; }
  .view-heading { align-items:flex-start; }
  .hero-card { padding:24px; }
  .hero-grid { grid-template-columns:1fr; }
  .hero-target { align-items:flex-start; }
  .target-amount { margin-top:7px; }
  .progress-wrap { margin-top:16px; max-width:none; }
  .panel.span-4, .panel.span-5, .panel.span-6, .panel.span-7, .panel.span-8 { grid-column:span 12; }
  .dashboard-footer { padding:0 16px 24px; flex-direction:column; }
  .mandate-grid { grid-template-columns:1fr 1fr; }
}

@media (max-width: 620px) {
  .view-heading { display:block; }
  .view-badge { display:inline-block; margin-top:14px; }
  .hero-card h2 { font-size:31px; }
  .metric-grid { grid-template-columns:1fr 1fr; }
  .metric-card { min-height:110px; }
  .metric-value { font-size:21px; }
  .allocation-layout { grid-template-columns:1fr; justify-items:center; }
  .legend { width:100%; grid-template-columns:1fr 1fr; }
  .allocation-row { grid-template-columns:93px 1fr 45px; }
  .roadmap, .pipeline { grid-template-columns:1fr; }
  .roadmap-step, .pipeline-item { border-right:0; border-bottom:1px solid var(--line); }
  .roadmap-step:last-child, .pipeline-item:last-child { border-bottom:0; }
  .property-grid { grid-template-columns:1fr; }
  .property-stats { grid-template-columns:1fr 1fr 1fr; }
  .safe-mix { grid-template-columns:1fr 1fr; }
  .allocation-numbers { grid-template-columns:1fr; }
  .mandate-grid { grid-template-columns:1fr; }
  .mandate-rule { flex-direction:column; }
  .action-toolbar { align-items:flex-start; flex-direction:column; }
  .action-item { grid-template-columns:18px 30px 1fr; }
  .action-priority { grid-column:3; justify-self:start; }
  .data-audit { grid-template-columns:1fr; }
  .audit-arrow { transform:rotate(90deg); text-align:center; }
  .ownership-card { grid-template-columns:1fr; }
  .freshness + .icon-button { display:none; }
}

@media (max-width: 420px) {
  .metric-grid { grid-template-columns:1fr; }
  .mobile-tabs { padding-left:8px; padding-right:8px; }
  .mobile-brand strong { display:none; }
  .hero-card { padding:20px; }
  .hero-card h2 { font-size:27px; }
  .target-amount { font-size:42px; }
  .legend { grid-template-columns:1fr; }
  .two-column-settings { grid-template-columns:1fr; }
}

@media print {
  .sidebar, .topbar, .mobile-tabs, .settings-drawer, .drawer-backdrop, .toast { display:none !important; }
  .main-content { margin:0; }
  body, .hero-card, .panel, .metric-card, .property-card { background:#fff !important; color:#111 !important; }
  #dashboard { max-width:none; padding:15px; }
  .dashboard-view { animation:none; }
  .panel, .metric-card, .hero-card, .property-card { break-inside:avoid; border-color:#ccc; box-shadow:none; }
}

/* Simplified briefing layout */
.simple-view { display:grid; gap:16px; }
.simple-heading { margin-bottom:4px; }
.simple-heading h1 { font-size:clamp(30px,3.4vw,48px); }

.simple-goal {
  padding:28px 30px;
  border:1px solid rgba(var(--accent-rgb),.22);
  border-radius:20px;
  background:linear-gradient(130deg, rgba(var(--accent-rgb),.10), var(--surface) 48%);
  box-shadow:var(--shadow);
}
.simple-label { color:var(--accent); font:9px ui-monospace,monospace; letter-spacing:.13em; }
.simple-goal h2 { max-width:1100px; margin:14px 0 23px; font-size:clamp(26px,3.4vw,49px); line-height:1.08; letter-spacing:-.05em; }
.simple-goal h2 em { color:var(--accent); font-style:normal; }
.goal-rules { display:flex; flex-wrap:wrap; gap:8px; }
.goal-rules strong { padding:8px 11px; border:1px solid var(--line-strong); border-radius:8px; background:rgba(255,255,255,.025); font-size:9px; font-weight:540; }

.capital-card {
  padding:22px 25px;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:end;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface);
}
.capital-card > span { color:var(--muted); font-size:11px; }
.capital-card > strong { grid-row:1 / span 2; grid-column:2; font-size:clamp(30px,4.5vw,58px); line-height:.95; letter-spacing:-.055em; font-weight:590; }
.capital-card p { margin:6px 0 0; color:var(--faint); font-size:9px; }

.simple-panel { grid-column:1 / -1; }
.simple-panel .panel-header { min-height:72px; padding:18px 21px; }
.simple-panel .panel-header h3 { font-size:17px; }
.simple-panel .panel-body { padding:0; }
.positions-table th, .allocation-table th { padding:13px 16px; }
.positions-table td, .allocation-table td { padding:14px 16px; font-size:11px; }
.positions-table tbody tr:hover td { background:var(--surface-2); }
.rate-cell { color:var(--text); font:11px ui-monospace,monospace; font-weight:560; }

.allocation-table { table-layout:fixed; }
.allocation-table th { text-align:center; border-right:1px solid var(--line); }
.allocation-table th:first-child { width:31%; text-align:left; }
.allocation-table td { color:var(--text); text-align:center; border-right:1px solid rgba(0,0,0,.22); }
.allocation-table td:first-child { text-align:left; }
.allocation-table tr.cat-cash td { background:color-mix(in srgb, var(--cash) 62%, var(--surface)); color:#171817; }
.allocation-table tr.cat-realestate td { background:color-mix(in srgb, var(--realestate) 65%, var(--surface)); color:#121712; }
.allocation-table tr.cat-gold td { background:color-mix(in srgb, var(--gold) 67%, var(--surface)); color:#17140c; }
.allocation-table tr.cat-market td { background:color-mix(in srgb, var(--market) 72%, var(--surface)); color:#11151c; }
.allocation-table tr.cat-loans td { background:color-mix(in srgb, var(--loans) 74%, var(--surface)); color:#19120f; }
.allocation-table tr.cat-crypto td { background:color-mix(in srgb, var(--crypto) 72%, var(--surface)); color:#fff; }
.allocation-table tfoot td { padding:16px; color:var(--text); font-size:12px; text-align:center; background:var(--surface-2); border-top:2px solid var(--line-strong); }
.allocation-table tfoot td:first-child { text-align:left; }

@media (max-width:760px) {
  .simple-goal { padding:22px 20px; }
  .capital-card { grid-template-columns:1fr; gap:10px; align-items:start; }
  .capital-card > strong { grid-row:auto; grid-column:auto; }
  .positions-table td, .allocation-table td { padding:11px 12px; }
  .allocation-table { min-width:680px; }
}

/* Top navigation and final Midnight layout */
.top-layout { margin-left:0; }
.topbar-title { display:flex; align-items:center; gap:15px; }
.topbar-title > span { color:var(--accent); font:9px ui-monospace,monospace; letter-spacing:.14em; }
.topbar-title > strong { font-size:13px; font-weight:600; }

.fund-tabs {
  position:sticky;
  top:72px;
  z-index:19;
  width:min(1480px,calc(100% - 60px));
  margin:18px auto 0;
  padding:6px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  border:1px solid var(--line);
  border-radius:14px;
  background:color-mix(in srgb,var(--bg) 90%,transparent);
  box-shadow:0 16px 45px rgba(0,0,0,.17);
  backdrop-filter:blur(18px);
}
.fund-tabs button {
  min-width:0;
  height:52px;
  padding:0 14px;
  display:grid;
  grid-template-columns:22px 1fr auto;
  align-items:center;
  gap:9px;
  border:1px solid transparent;
  border-radius:10px;
  background:transparent;
  color:var(--muted);
  text-align:left;
  cursor:pointer;
  transition:180ms ease;
}
.fund-tabs button:hover { background:var(--surface-2); color:var(--text); }
.fund-tabs button.active { color:var(--text); border-color:rgba(var(--accent-rgb),.22); background:rgba(var(--accent-rgb),.085); }
.fund-tabs button > span { color:var(--faint); font:8px ui-monospace,monospace; }
.fund-tabs button.active > span { color:var(--accent); }
.fund-tabs button b { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:10px; font-weight:580; }
.fund-tabs button i { color:var(--faint); font:normal 8px ui-monospace,monospace; white-space:nowrap; }
.fund-tabs button.active i { color:var(--muted); }

.simple-goal h2 { margin-bottom:0; }
.panel-controls { display:flex; align-items:center; gap:10px; }
.panel-toggle {
  height:30px;
  padding:0 10px;
  border:1px solid var(--line);
  border-radius:7px;
  background:var(--surface-2);
  color:var(--muted);
  font-size:8px;
  cursor:pointer;
}
.panel-toggle:hover { color:var(--text); border-color:var(--line-strong); }
.simple-panel.collapsed .panel-body { display:none; }
.simple-panel.collapsed .panel-header { border-bottom:0; }
.number-cell { color:var(--text); font:10px ui-monospace,monospace; white-space:nowrap; }
.positions-table tfoot td {
  padding:16px;
  border-top:2px solid var(--line-strong);
  background:var(--surface-2);
  color:var(--text);
  font-size:11px;
}

body[data-table-style="subtle"] .allocation-table tbody td { color:var(--text); background:var(--surface-2); }
body[data-table-style="subtle"] .allocation-table tbody tr:nth-child(even) td { background:var(--surface-3); }
body[data-table-style="subtle"] .allocation-table tbody td:first-child { border-left:4px solid var(--row-color,var(--accent)); }
body[data-table-style="subtle"] .allocation-table tr.cat-cash { --row-color:var(--cash); }
body[data-table-style="subtle"] .allocation-table tr.cat-realestate { --row-color:var(--realestate); }
body[data-table-style="subtle"] .allocation-table tr.cat-gold { --row-color:var(--gold); }
body[data-table-style="subtle"] .allocation-table tr.cat-market { --row-color:var(--market); }
body[data-table-style="subtle"] .allocation-table tr.cat-loans { --row-color:var(--loans); }

body {

.topbar {

.topbar-title { min-width:150px; }
.topbar-title > strong { display:none; }
.topbar .fund-tabs {
  position:static;
  flex:1;
  width:auto;
  max-width:980px;
  margin:0;
  padding:5px;
  display:flex;
  border-color:rgba(143,168,255,.13);
  background:rgba(16,21,34,.82);

}
.topbar .fund-tabs button { width:auto; min-width:210px; max-width:245px; flex:1 1 210px; }
.topbar .fund-tabs button { grid-template-columns:1fr; justify-items:center; text-align:center; }
.topbar .fund-tabs button[hidden] { display:none; }
.topbar .fund-tabs button.active {
  background:linear-gradient(135deg,rgba(var(--accent-rgb),.17),rgba(var(--accent-rgb),.07));
  border-color:rgba(var(--accent-rgb),.32);
  box-shadow:0 7px 20px rgba(var(--accent-rgb),.08),inset 0 1px 0 rgba(255,255,255,.05);
}
#dashboard { position:relative; padding-top:30px; }
.simple-heading h1 { text-shadow:0 10px 45px rgba(var(--accent-rgb),.14); }
.simple-goal {
  position:relative;
  overflow:hidden;
  padding:34px 36px;
  border-color:rgba(var(--accent-rgb),.25);
  background:
    radial-gradient(circle at 88% 40%,rgba(var(--accent-rgb),.14),transparent 24%),
    linear-gradient(125deg,rgba(var(--accent-rgb),.11),rgba(16,21,34,.95) 48%,rgba(12,17,29,.96));
  box-shadow:0 30px 80px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.04);
}
.simple-goal::after {
  content:"";
  position:absolute;
  right:-80px;
  top:-150px;
  width:360px;
  height:360px;
  border-radius:50%;
  border:1px solid rgba(var(--accent-rgb),.12);
  box-shadow:0 0 0 42px rgba(var(--accent-rgb),.025),0 0 0 85px rgba(var(--accent-rgb),.018);
}
.simple-goal h2 { position:relative; z-index:1; max-width:1180px; }
.simple-goal .simple-label {
  position:relative;
  z-index:1;
  display:inline-flex;
  padding:7px 10px;
  border:1px solid rgba(var(--accent-rgb),.22);
  border-radius:7px;
  background:rgba(var(--accent-rgb),.07);
  color:var(--accent);
  font-size:12px;
  font-weight:800;
  letter-spacing:.16em;
}
.simple-goal h2 { margin-top:20px; font-size:clamp(34px,4.2vw,62px); line-height:1.04; }
.capital-card,.simple-panel {
  background:linear-gradient(145deg,rgba(17,23,37,.97),rgba(12,17,29,.97));

.capital-card { border-left:3px solid var(--accent); }
.capital-card > strong { text-shadow:0 10px 38px rgba(var(--accent-rgb),.18); }
.capital-card > strong { font-size:clamp(46px,6vw,78px); font-weight:720; }
.capital-card > span { color:#a9b4ca; font-size:12px; font-weight:650; }
.simple-panel .panel-header {
  background:linear-gradient(90deg,rgba(var(--accent-rgb),.035),transparent 44%);
  border-bottom-color:rgba(143,168,255,.12);
}
.simple-panel .panel-header h3 { font-size:19px; letter-spacing:-.025em; }
.panel-toggle,.comment-button {
  border:1px solid rgba(var(--accent-rgb),.18);
  background:rgba(var(--accent-rgb),.075);

}
.panel-toggle:hover,.comment-button:hover { border-color:rgba(var(--accent-rgb),.42); background:rgba(var(--accent-rgb),.14); color:white; }
.comment-button { height:29px; padding:0 9px; border-radius:7px; font-size:8px; cursor:pointer; white-space:nowrap; }
.positions-table thead th {
  height:44px;

}

.positions-table tfoot td { background:#101728; border-top-color:rgba(var(--accent-rgb),.25); }

.allocation-table {
  min-width:760px;
  background:#0c111e;
  border-collapse:separate;
  border-spacing:0;
}
.allocation-table thead tr:first-child th {
  height:58px;

  color:#dfe6fa;
  border-bottom:1px solid #2b3650;
}

.allocation-table tr.cat-cash td { background:linear-gradient(90deg,#4c526d,#42485f); color:#f4f6fc; }

.allocation-table tfoot td { height:63px; background:#111827; border-top:2px solid #34425f; font-size:13px; }

.modal-backdrop {
  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(2,4,10,.74);
  backdrop-filter:blur(8px);
  opacity:0;
  visibility:hidden;
  transition:180ms ease;
}
.modal-backdrop.open { opacity:1; visibility:visible; }
.asset-modal {
  position:fixed;
  z-index:110;
  left:50%;
  top:50%;
  width:min(1180px,calc(100vw - 36px));
  max-height:calc(100vh - 36px);
  border:1px solid rgba(var(--accent-rgb),.21);
  border-radius:20px;
  background:linear-gradient(145deg,#12192a,#090e19);
  box-shadow:0 45px 140px rgba(0,0,0,.58),inset 0 1px 0 rgba(255,255,255,.04);

  visibility:hidden;
  transform:translate(-50%,-47%) scale(.98);
  transition:220ms cubic-bezier(.2,.8,.2,1);
  overflow:hidden;

.asset-modal-header { height:82px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(143,168,255,.12); background:rgba(11,16,28,.74); }

.modal-summary > strong { font-size:32px; letter-spacing:-.05em; }
.modal-summary > div { display:flex; flex-wrap:wrap; justify-content:flex-end; gap:7px; }
.modal-summary span { padding:6px 9px; border-radius:99px; background:rgba(var(--accent-rgb),.08); border:1px solid rgba(var(--accent-rgb),.15); color:var(--muted); font-size:8px; }
.comment-copy { margin:14px 0; padding:5px 20px; border-left:2px solid var(--accent); }
.comment-copy p { margin:11px 0; max-width:930px; color:#c0c9db; font-size:12px; line-height:1.65; }
.modal-table-wrap { margin-top:18px; overflow:auto; border:1px solid rgba(143,168,255,.13); border-radius:13px; }
.modal-detail-table { min-width:940px; width:100%; border-collapse:collapse; }
.modal-detail-table th { position:sticky; top:0; z-index:1; padding:11px 12px; background:#101728; color:#707d95; font:8px ui-monospace,monospace; text-transform:uppercase; letter-spacing:.08em; }
.modal-detail-table td { padding:10px 12px; border-top:1px solid rgba(143,168,255,.075); color:#9ca8bd; font-size:9px; }
.modal-detail-table td strong,.modal-detail-table tfoot td { color:#e5eaf6; }

body.modal-open { overflow:hidden; }

@media (max-width:1000px) {

}

function pageHeading(index, code, title, description) {
  return `<div class="view-heading simple-heading">
    <div>${index || code ? `<span class="eyebrow">${[index, code].filter(Boolean).join(" · ")}</span>` : ""}<h1>${title}</h1>${description ? `<p>${description}</p>` : ""}</div>
  </div>`;
}

function goalCard(title) {
  return `<section class="simple-goal"><span class="simple-label">ГЛАВНАЯ ЦЕЛЬ</span><h2>${title}</h2></section>`;
}

function capitalCard(label, value, note = "") {
  return `<section class="capital-card"><span>${label}</span><strong>${value}</strong>${note ? `<p>${note}</p>` : ""}</section>`;
}

function simplePanel(title, subtitle, body, meta = "") {
  return `<section class="panel simple-panel">
    <div class="panel-header">
      <div><h3>${title}</h3>${subtitle ? `<p>${subtitle}</p>` : ""}</div>
      <div class="panel-controls">${meta ? `<span class="panel-header-right">${meta}</span>` : ""}<button class="panel-toggle">Скрыть</button></div>
    </div>
    <div class="panel-body">${body}</div>
  </section>`;
}

function openAssetModal(id) {
  const item = comments[id];
  if (!item) return;
  document.getElementById("asset-modal-kicker").textContent = item.table ? "СОСТАВ ПОРТФЕЛЯ" : "КОММЕНТАРИЙ НИКОЛАЯ";
  document.getElementById("asset-modal-title").textContent = item.title;
  let html = `<div class="modal-summary"><strong>${item.amount}</strong><div>${item.tags.map((tag) => `<span>${tag}</span>`).join("")}</div></div>`;
  if (item.text?.length) html += `<div class="comment-copy">${item.text.map((paragraph) => `<p>${paragraph}</p>`).join("")}</div>`;
  if (item.table === "market") html += modalDetailTable(marketRows.filter((row) => !row[2].toLowerCase().includes("золото")), { amount: "$148 556", rate: "2,2%", month: "$435,81" });
  if (item.table === "gold") html += modalDetailTable(marketRows.filter((row) => row[2].toLowerCase().includes("золото")), { amount: "$87 796", rate: "0,0%", month: "$0,00" });
  if (item.table === "crypto") html += modalDetailTable(cryptoRows, { amount: "$60 424,87", rate: "1,5%", month: "$75,61" });
  document.getElementById("asset-modal-body").innerHTML = html;
  document.getElementById("asset-modal").classList.add("open");
  document.getElementById("asset-modal-backdrop").classList.add("open");
  document.getElementById("asset-modal").setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}

function closeAssetModal() {
  document.getElementById("asset-modal").classList.remove("open");
  document.getElementById("asset-modal-backdrop").classList.remove("open");
  document.getElementById("asset-modal").setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
}

function attachPanelToggles() {
  document.querySelectorAll(".panel-toggle").forEach((button) => button.addEventListener("click", () => {
    const panel = button.closest(".simple-panel");
    panel.classList.toggle("collapsed");
    button.textContent = panel.classList.contains("collapsed") ? "Раскрыть" : "Скрыть";
  }));
  document.querySelectorAll(".comment-button").forEach((button) => button.addEventListener("click", () => openAssetModal(button.dataset.comment)));
}

function renderDashboard(fund) {
  const renderers = { personal: personalView, moscow: moscowView, solid: solidView, safe: safeView };
  document.getElementById("dashboard").innerHTML = renderers[fund]();
  document.getElementById("current-fund-name").textContent = FUND_NAMES[fund];
  document.querySelectorAll("[data-fund]").forEach((button) => button.classList.toggle("active", button.dataset.fund === fund));
  localStorage.setItem("wealth-current-fund", fund);
  document.body.dataset.currentFund = fund;
  attachPanelToggles();
  window.scrollTo({ top: 0, behavior: document.body.classList.contains("no-animations") ? "auto" : "smooth" });
}

function setAccent(hex) {
  const rgb = hex.match(/[a-f\d]{2}/gi).map((part) => parseInt(part, 16)).join(", ");
  document.documentElement.style.setProperty("--accent", hex);
  document.documentElement.style.setProperty("--accent-rgb", rgb);
}

const defaults = { accent: "#8fa8ff", density: "comfortable", radius: "soft", tableStyle: "color", animations: true, glow: true, showMoscow: false, showSolid: false, showSafe: false };
const loadSettings = () => ({ ...defaults, ...JSON.parse(localStorage.getItem("wealth-design-settings") || "{}") });
const saveSettings = (settings) => localStorage.setItem("wealth-design-settings", JSON.stringify(settings));

function applySettings(settings) {
  document.documentElement.dataset.theme = "midnight";
  setAccent(settings.accent);
  document.body.dataset.density = settings.density;
  document.body.dataset.radius = settings.radius;
  document.body.dataset.tableStyle = settings.tableStyle;
  document.body.dataset.glow = settings.glow ? "on" : "off";
  document.body.classList.toggle("no-animations", !settings.animations);
  document.querySelectorAll(".accent").forEach((b) => b.classList.toggle("active", b.dataset.accent === settings.accent));
  document.getElementById("density-select").value = settings.density;
  document.getElementById("radius-select").value = settings.radius;
  document.getElementById("table-style-select").value = settings.tableStyle;
  document.getElementById("animations-toggle").checked = settings.animations;
  document.getElementById("glow-toggle").checked = settings.glow;
  document.getElementById("show-moscow-toggle").checked = settings.showMoscow;
  document.getElementById("show-solid-toggle").checked = settings.showSolid;
  document.getElementById("show-safe-toggle").checked = settings.showSafe;
  document.querySelector('[data-fund="moscow"]').hidden = !settings.showMoscow;
  document.querySelector('[data-fund="solid"]').hidden = !settings.showSolid;
  document.querySelector('[data-fund="safe"]').hidden = !settings.showSafe;
}

function openSettings() {
  document.getElementById("settings-drawer").classList.add("open");
  document.getElementById("drawer-backdrop").classList.add("open");
}
function closeSettings() {
  document.getElementById("settings-drawer").classList.remove("open");
  document.getElementById("drawer-backdrop").classList.remove("open");
}

document.querySelectorAll("[data-fund]").forEach((button) => button.addEventListener("click", () => renderDashboard(button.dataset.fund)));

document.getElementById("settings-close").addEventListener("click", closeSettings);
document.getElementById("drawer-backdrop").addEventListener("click", closeSettings);
document.getElementById("asset-modal-close").addEventListener("click", closeAssetModal);
document.getElementById("asset-modal-backdrop").addEventListener("click", closeAssetModal);
document.getElementById("presentation-toggle").addEventListener("click", () => document.body.classList.toggle("presentation-mode"));
document.addEventListener("keydown", (event) => { if (event.key === "Escape") { closeSettings(); closeAssetModal(); } });
document.querySelectorAll(".accent").forEach((button) => button.addEventListener("click", () => { const s = loadSettings(); s.accent = button.dataset.accent; saveSettings(s); applySettings(s); }));
document.getElementById("density-select").addEventListener("change", (event) => { const s = loadSettings(); s.density = event.target.value; saveSettings(s); applySettings(s); });
document.getElementById("radius-select").addEventListener("change", (event) => { const s = loadSettings(); s.radius = event.target.value; saveSettings(s); applySettings(s); });
document.getElementById("table-style-select").addEventListener("change", (event) => { const s = loadSettings(); s.tableStyle = event.target.value; saveSettings(s); applySettings(s); });
document.getElementById("animations-toggle").addEventListener("change", (event) => { const s = loadSettings(); s.animations = event.target.checked; saveSettings(s); applySettings(s); });
document.getElementById("glow-toggle").addEventListener("change", (event) => { const s = loadSettings(); s.glow = event.target.checked; saveSettings(s); applySettings(s); });
[["show-moscow-toggle","showMoscow"],["show-solid-toggle","showSolid"],["show-safe-toggle","showSafe"]].forEach(([id,key]) => document.getElementById(id).addEventListener("change", (event) => {
  const s = loadSettings(); s[key] = event.target.checked; saveSettings(s); applySettings(s);
  const current = document.body.dataset.currentFund;
  if ((current === "moscow" && !s.showMoscow) || (current === "solid" && !s.showSolid) || (current === "safe" && !s.showSafe)) renderDashboard("personal");
}));
document.getElementById("reset-settings").addEventListener("click", () => { saveSettings(defaults); applySettings(defaults); renderDashboard("personal"); });

const settings = loadSettings();
applySettings(settings);
const initialFund = localStorage.getItem("wealth-current-fund") || "personal";
const initialVisible = initialFund === "personal" || (initialFund === "moscow" && settings.showMoscow) || (initialFund === "solid" && settings.showSolid) || (initialFund === "safe" && settings.showSafe);
renderDashboard(initialVisible && FUND_NAMES[initialFund] ? initialFund : "personal");

    </script>
